<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>개인정보처리방침</title><style>body{font-family:sans-serif;padding:40px;max-width:800px;margin:0 auto;line-height:1.6;}</style></head><body><h1>개인정보처리방침</h1><p>이터널식스는 정보통신망 이용촉진 및 정보보호 등에 관한 법률 등 관련 법령에 따라 이용자의 개인정보 보호 및 권익을 보호합니다.</p><h2>1. 개인정보의 수집 항목 및 이용 목적</h2><p>결제 및 서비스 제공을 위해 최소한의 정보(이메일, 이름 등)를 수집합니다.</p><h2>2. 개인정보의 보유 및 이용기간</h2><p>원칙적으로 개인정보 수집 및 이용목적이 달성된 후에는 해당 정보를 지체 없이 파기합니다.</p></body></html>

<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>취소 및 환불 안내</title><style>body{font-family:sans-serif;padding:40px;max-width:800px;margin:0 auto;line-height:1.6;}</style></head><body><h1>취소 및 환불 정책</h1><p>이터널식스의 결제 취소 및 환불 안내입니다.</p><h2>1. 결제 취소 (환불)</h2><p>결제 후 7일 이내에 서비스 미사용 시 전액 환불이 가능합니다.</p><h2>2. 환불 불가 사유</h2><p>다음의 경우 환불이 제한될 수 있습니다.<br>- 이미 서비스(플랫폼, 온라인 강의 등)의 이용 기록이 있는 경우<br>- 맞춤형 컨설팅 및 보고서 제작이 착수된 경우</p></body></html>

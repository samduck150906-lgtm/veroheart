<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>이용약관</title><style>body{font-family:sans-serif;padding:40px;max-width:800px;margin:0 auto;line-height:1.6;}</style></head><body><h1>이용약관</h1><p>이터널식스(이하 "회사")가 제공하는 서비스 이용과 관련하여 회사와 이용자의 권리, 의무 및 책임사항을 규정합니다.</p><h2>제1조 (목적)</h2><p>본 약관은 회사가 제공하는 서비스의 이용조건 및 절차, 회사와 회원 간의 권리와 의무를 규정함을 목적으로 합니다.</p><h2>제2조 (약관의 효력 및 변경)</h2><p>본 약관은 서비스를 통하여 공지하거나 전자우편 등의 방법으로 회원에게 통지함으로써 효력을 발생합니다.</p></body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패 | 이터널식스</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 48px 40px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .icon { width: 80px; height: 80px; border-radius: 50%; background: #fee2e2; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 40px; }
        h1 { font-size: 24px; color: #111827; margin-bottom: 12px; }
        .desc { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
        .error-code { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; color: #991b1b; margin: 16px 0 24px; }
        .btn { display: inline-block; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; transition: all 0.2s; margin: 0 8px; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .footer { margin-top: 32px; font-size: 11px; color: #9ca3af; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">😔</div>
        <h1>결제에 실패했습니다</h1>
        <p class="desc" id="fail-message">결제 처리 중 문제가 발생했습니다.</p>
        <div class="error-code" id="error-detail"></div>
        <div>
            <a href="/checkout.html" class="btn btn-primary">다시 결제하기</a>
            <a href="/" class="btn btn-secondary">홈으로</a>
        </div>
        <div class="footer">
            문의: ceo@eternalsix.kr | 010-8111-9370<br>
            상호명: 이터널식스 | 사업자등록번호: 303-28-65658
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || 'UNKNOWN_ERROR';
        const message = params.get('message') || '알 수 없는 오류가 발생했습니다.';
        document.getElementById('fail-message').textContent = message;
        document.getElementById('error-detail').textContent = '오류 코드: ' + code;
    </script>
</body>
</html>

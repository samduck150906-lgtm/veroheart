[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/admin"
  status = 302
  conditions = {Host = ["veroro-admin.netlify.app"]}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

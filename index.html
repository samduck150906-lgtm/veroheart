<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/veroro-logo.png" />
    <link rel="apple-touch-icon" href="/veroro-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>베로로</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 테마 무플래시 초기화 — React 마운트 전에 data-theme 적용
      (function () {
        try {
          var saved = localStorage.getItem('vh_theme'); // 'light' | 'dark' | 'system' | null
          var mode = saved || 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) { /* ignore */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
